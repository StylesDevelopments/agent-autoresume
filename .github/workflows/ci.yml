name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.x"

      - name: Install tmux + zsh
        run: sudo apt-get update && sudo apt-get install -y tmux zsh

      - name: Shell syntax check (bash -n)
        run: |
          for f in agent-autoresume.sh install.sh \
                   iterm/install-iterm.sh tmux/install-tmux.sh \
                   tests/test_tmux_integration.sh tests/test_shell_wrap.sh; do
            echo "bash -n $f"
            bash -n "$f"
          done

      - name: No bash-4-only syntax (macOS ships bash 3.2)
        run: |
          if grep -rnE '\$\{[A-Za-z_]+(\^\^|,,|\^|,)' \
               agent-autoresume.sh install.sh \
               iterm/install-iterm.sh tmux/install-tmux.sh \
               tests/test_tmux_integration.sh tests/test_shell_wrap.sh; then
            echo "::error::bash-4-only parameter expansion found (breaks macOS bash 3.2)"
            exit 1
          fi
          echo "clean"

      - name: shellcheck (advisory)
        continue-on-error: true
        run: |
          sudo apt-get install -y shellcheck
          shellcheck agent-autoresume.sh install.sh \
                     iterm/install-iterm.sh tmux/install-tmux.sh \
                     tests/test_tmux_integration.sh tests/test_shell_wrap.sh

      - name: Compile Python
        run: |
          python3 -m py_compile \
            limit_detect.py \
            iterm/agent-limit-watcher.py \
            tmux/tmux-limit-watcher.py

      - name: Unit tests (detection and parsing)
        run: |
          python3 tests/test_limit_detect.py
          python3 iterm/test_limit_watcher.py

      - name: "Integration test (tmux: real pane, real resume)"
        run: bash tests/test_tmux_integration.sh

      - name: "Shell-wrap unit test (zsh)"
        run: bash tests/test_shell_wrap.sh

      - name: "Opt-in shell-wrap installer is idempotent"
        run: |
          AUTORESUME_WRAP=1 bash tmux/install-tmux.sh
          test -f "$HOME/.config/agent-autoresume/shell-wrap.zsh"
          grep -qF "agent-autoresume/shell-wrap.zsh" "$HOME/.zshrc"
          AUTORESUME_WRAP=1 bash tmux/install-tmux.sh   # second run must not double-source
          n=$(grep -cF "agent-autoresume/shell-wrap.zsh" "$HOME/.zshrc")
          [ "$n" -eq 1 ] || { echo "::error::shell-wrap sourced $n times (expected 1)"; exit 1; }
          echo "idempotent: sourced exactly once"

  macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.x"

      - name: Install tmux
        run: brew install tmux

      - name: Bash 3.2 syntax + wrapper smoke (system /bin/bash)
        run: |
          /bin/bash --version | head -1
          for f in agent-autoresume.sh install.sh \
                   iterm/install-iterm.sh tmux/install-tmux.sh \
                   tests/test_tmux_integration.sh tests/test_shell_wrap.sh; do
            /bin/bash -n "$f"
          done
          /bin/bash agent-autoresume.sh --version
          /bin/bash agent-autoresume.sh --help >/dev/null
          rc=0; /bin/bash agent-autoresume.sh --tool >/dev/null 2>&1 || rc=$?
          [ "$rc" -eq 2 ] || { echo "::error::--tool with no value should exit 2, got $rc"; exit 1; }
          rc=0; /bin/bash agent-autoresume.sh --tool bogus xyz >/dev/null 2>&1 || rc=$?
          [ "$rc" -eq 2 ] || { echo "::error::--tool bogus should exit 2, got $rc"; exit 1; }

      - name: Compile + unit tests
        run: |
          python3 -m py_compile \
            limit_detect.py iterm/agent-limit-watcher.py tmux/tmux-limit-watcher.py
          python3 tests/test_limit_detect.py
          python3 iterm/test_limit_watcher.py

      - name: "Integration test (tmux: real pane, real resume)"
        run: bash tests/test_tmux_integration.sh

      - name: "Shell-wrap unit test (zsh)"
        run: bash tests/test_shell_wrap.sh

      - name: Generated launchd plist is valid
        run: |
          AUTORESUME_DRY_RUN=1 bash tmux/install-tmux.sh || true
          plutil -lint "$HOME/Library/LaunchAgents/com.stylesdevelopments.agent-autoresume-tmux.plist"
